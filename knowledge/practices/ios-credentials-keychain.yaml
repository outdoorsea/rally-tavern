id: practice-ios-credentials-keychain
title: iOS - Never Store Credentials in UserDefaults
contributed_by: mayor
contributor_type: mayor
created_at: 2026-03-06T00:00:00Z
verified_by: []
codebase_type: swift-ios

summary: |
  Auth tokens and passwords must live in the iOS Keychain, not UserDefaults.
  UserDefaults are unencrypted on disk and accessible in unencrypted backups.

details: |
  UserDefaults data is stored in plaintext in the app container at
  Library/Preferences/<bundle-id>.plist. It is included in unencrypted iTunes/Finder
  backups, accessible on jailbroken devices, and readable by MDM profiles on managed
  devices.

  The Keychain provides hardware-backed encryption and access control classes:
  - .whenUnlocked — only when device is unlocked (most secure)
  - .afterFirstUnlock — survives reboot, accessible in background (use for auth tokens
    that background sync tasks need to read)
  - .whenPasscodeSetThisDeviceOnly — most secure, but not backed up

  Commonly misplaced in UserDefaults:
  - Auth tokens (myndyAuthToken, api_key, bearer_token)
  - Passwords (myndyPassword)
  - Session cookies
  - API secrets

  Acceptable in UserDefaults:
  - User preferences (theme, sync interval setting)
  - Last sync date timestamps
  - Non-sensitive counters
  - Feature flags

examples: |
  ```swift
  // ❌ BAD — unencrypted
  UserDefaults.standard.set(token, forKey: "authToken")
  let token = UserDefaults.standard.string(forKey: "authToken")

  // ✅ GOOD — Keychain with afterFirstUnlock for background access
  import Security

  func saveTokenToKeychain(_ token: String) {
      let data = token.data(using: .utf8)!
      let query: [CFString: Any] = [
          kSecClass: kSecClassGenericPassword,
          kSecAttrAccount: "authToken",
          kSecAttrAccessible: kSecAttrAccessibleAfterFirstUnlock,
          kSecValueData: data
      ]
      SecItemDelete(query as CFDictionary)
      SecItemAdd(query as CFDictionary, nil)
  }

  func loadTokenFromKeychain() -> String? {
      let query: [CFString: Any] = [
          kSecClass: kSecClassGenericPassword,
          kSecAttrAccount: "authToken",
          kSecReturnData: true,
          kSecMatchLimit: kSecMatchLimitOne
      ]
      var result: AnyObject?
      guard SecItemCopyMatching(query as CFDictionary, &result) == errSecSuccess,
            let data = result as? Data else { return nil }
      return String(data: data, encoding: .utf8)
  }
  ```

gotchas:
  - Use .afterFirstUnlock (not .whenUnlocked) for tokens that background sync needs — .whenUnlocked blocks background reads after a reboot
  - Always call SecItemDelete before SecItemAdd (upsert pattern) — SecItemAdd fails with errSecDuplicateItem if the key already exists
  - Don't forget to handle the migration from UserDefaults to Keychain on first launch after upgrade — read from UserDefaults, write to Keychain, delete from UserDefaults
  - Passwords should never be stored anywhere after initial login — re-authenticate via token only, never re-send password from storage

tags: [ios, swift, security, keychain, credentials, auth]
