id: github-actions-gitleaks-secrets-scan
problem: |
  Need to detect committed secrets in a GitHub repository as part of CI/CD,
  satisfying SOC 2 M4 (secrets management) requirements. Known test fixtures
  and CI-only keys must be allowlisted to avoid false positives.
solution: |
  Add gitleaks-action to GitHub Actions CI with a .gitleaks.toml allowlist for
  known test-only keys. Scans full git history on every push and PR.

  ## 1. Add to .github/workflows/ci.yml

  ```yaml
  jobs:
    secrets:
      name: Secrets Scan
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0          # full history scan
        - uses: gitleaks/gitleaks-action@v2
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ```

  ## 2. Create .gitleaks.toml at repo root

  ```toml
  title = "Gitleaks Configuration"

  [allowlist]
    description = "Allowlisted test fixtures and CI-only keys"
    commits = []
    paths = [
      "tests/fixtures/.*",
      "tests/conftest\\.py",
    ]
    regexes = [
      # Add specific patterns for known test keys, e.g.:
      # "test_secret_key_do_not_use",
    ]
  ```

  ## 3. Commit both files and push

  Gitleaks will scan all commits reachable from HEAD on every CI run.

