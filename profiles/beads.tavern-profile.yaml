# Beads — Project Profile
# =======================
# AI-native issue tracker with first-class dependency support.
# Visibility: PUBLIC (github.com/steveyegge/beads)

id: project-beads
name: "Beads"
description: |
  Lightweight, AI-native issue tracker designed to live directly in project
  codebases. Issues chained together like beads — with first-class dependency
  tracking, blocking/blocked-by relationships, and molecule-based work
  decomposition. Built for AI coding agents, not web UIs.
repo: github.com/steveyegge/beads

facets:
  platform: cli
  languages: [go]
  frameworks: [cobra]
  runtime: go
  build_system: make
  package_manager: go-modules

architecture:
  style: cli-tool
  data_stores: [dolt]
  protocols: [cli, mysql]
  deployment: homebrew
  ci_cd: github-actions

needs:
  - "Stable database server lifecycle"
  - "Cross-rig issue routing via prefix-based resolution"
  - "Ephemeral molecule cleanup and compaction"
  - "Formula cooking and molecule orchestration"

tags: [issue-tracking, cli, ai-native, dependency-graph, infrastructure]
