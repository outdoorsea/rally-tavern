  codebases. Issues chained together like beads — with first-class dependency
  tracking, blocking/blocked-by relationships, and molecule-based work
  decomposition. Built for AI coding agents, not web UIs.

facets:
  platform: cli
  languages: [go]
  frameworks: [cobra]
  runtime: go

needs:
  - "Stable database server lifecycle"
  - "Cross-rig issue routing via prefix-based resolution"
  - "Ephemeral molecule cleanup and compaction"
  - "Formula cooking and molecule orchestration"

tags: [issue-tracking, cli, ai-native, dependency-graph, infrastructure]
