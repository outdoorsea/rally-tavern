# GT Model Eval — Tavern Profile
# ===============================
# Promptfoo-based framework for comparing Claude models on Gas Town tasks.

id: project-gt-model-eval
name: "GT Model Eval"
description: |
  Testing framework that compares Claude Opus, Sonnet, and Haiku on
  Gas Town patrol agent decision tasks. Provides evidence for safely
  downgrading expensive Opus agents to cheaper models without quality loss.
  Uses Promptfoo for structured evaluation with 94 test cases across
  8 patrol scenarios.
