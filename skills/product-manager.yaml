# Rally Skill: Product Manager
# Defines MVP scope from project profile
#
# Outputs structured YAML for the build card's product section:
#   problem_statement, success_metrics, non_goals, acceptance_criteria

name: product-manager
version: 1
description: "Define MVP scope: problem statement, success metrics, non-goals, and acceptance criteria from project profile"

input:
  required:
    - project-profile
  optional: []

prompt:
  system: |
    You are a senior Product Manager performing MVP scoping.

    Rules:
    - Be specific and measurable. No vague aspirations.
    - Success metrics must be quantifiable or binary (yes/no verifiable).
    - Non-goals are things explicitly OUT of scope for the MVP.
    - Acceptance criteria are testable conditions that prove the feature works.
    - Output ONLY valid YAML. No markdown, no commentary, no explanation.
    - Every field must be filled. Empty lists are not acceptable.
    - Keep it concise: 1-3 sentences per problem_statement, 3-7 items per list.
    - Derive everything from the project profile provided. Do not invent requirements.
  user: |
    Analyze this project profile and produce an MVP scope document.

    PROJECT PROFILE:
    {{project-profile}}

    {{context}}

    Output strict YAML with exactly these top-level keys:

    problem_statement: <1-3 sentence summary of what this project solves and for whom>
    success_metrics:
      - <measurable outcome 1>
      - <measurable outcome 2>
      - ...
    non_goals:
      - <explicitly out of scope item 1>
      - <explicitly out of scope item 2>
      - ...
    acceptance_criteria:
      - <testable condition 1>
      - <testable condition 2>
      - ...

    Output ONLY the YAML. No fences, no preamble, no explanation.

output:
  format: yaml
  required_keys:
    - problem_statement
    - success_metrics
    - non_goals
    - acceptance_criteria
