# Rally Project Profile
# Generated by: rally init
# Schema version: 1

schema_version: 1

# --- Project Identity ---
project:
  name: ""                    # Human-readable project name
  slug: ""                    # Machine-friendly identifier (lowercase, hyphens)
  description: ""             # One-line summary
  repo: ""                    # Git remote URL (optional)

# --- Platform & Stack ---
platform: ""                  # Primary platform (see facets.yaml for vocabulary)
language: ""                  # Primary language
framework: ""                 # Primary framework (optional)
stack_preset: ""              # Stack preset name (optional, from defaults/stacks/)

# --- Facets (Project Characteristics) ---
facets:
  auth: "none"                # none | session | jwt | oauth2 | api-key | multi
  database: "none"            # none | sqlite | postgres | mysql | mongo | redis | multi
  api_style: "none"           # none | rest | graphql | grpc | websocket | multi
  deployment: "local"         # local | docker | cloud-vm | serverless | k8s | edge
  ui: "none"                  # none | web-spa | web-ssr | mobile-native | cli | tui | desktop
  realtime: false             # Requires real-time features (websocket, SSE, etc.)
  multi_tenant: false         # Multi-tenant architecture
  file_storage: false         # File upload/storage requirements
  search: false               # Full-text search requirements
  queue: false                # Background job/message queue
  caching: false              # Caching layer requirements
  i18n: false                 # Internationalization

# --- Constraints ---
constraints:
  budget: ""                  # free | startup | enterprise (affects tool choices)
  timeline: ""                # hack | sprint | quarter | long-term
  team_size: "solo"           # solo | small (2-5) | medium (6-15) | large (15+)
  compliance: []              # HIPAA | SOC2 | GDPR | PCI-DSS | FedRAMP | none
  hosting: ""                 # self-hosted | cloud | hybrid

# --- Priorities (rank 1-5, lower = more important) ---
priorities:
  speed_to_market: 3
  scalability: 3
  security: 3
  maintainability: 3
  developer_experience: 3

# --- Additional Context ---
notes: ""                     # Free-form notes for planning skills
